services:
  mysql_test:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_test
      MYSQL_DATABASE: controlador_financeiro_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_pass
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot_test"]
      interval: 2s
      timeout: 2s
      retries: 30

# nota: não usar volume nomeado persistente para testes; o compose criará um volume anônimo
